<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile Frame Creator</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
      color: #1a1a2e;
    }
    h1 {
      font-size: 1.8rem;
      margin-bottom: 0.3rem;
      color: #1a1a2e;
    }
    .subtitle {
      color: #666;
      margin-bottom: 2rem;
      font-size: 0.95rem;
    }
    .app-container {
      display: flex;
      flex-wrap: wrap;
      gap: 2rem;
      justify-content: center;
      max-width: 950px;
      width: 100%;
    }
    .panel {
      background: #fff;
      border-radius: 14px;
      padding: 1.5rem;
      box-shadow: 0 2px 16px rgba(0,0,0,0.07);
    }
    .left-panel {
      flex: 1;
      min-width: 300px;
      max-width: 420px;
    }
    .right-panel {
      flex: 1;
      min-width: 300px;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .section-title {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 0.75rem;
      color: #333;
    }
    .step-label {
      display: inline-block;
      background: #4a6fa5;
      color: #fff;
      width: 22px; height: 22px;
      border-radius: 50%;
      text-align: center;
      line-height: 22px;
      font-size: 0.75rem;
      font-weight: 700;
      margin-right: 6px;
    }

    /* Upload */
    .upload-area {
      border: 2px dashed #d0d5dd;
      border-radius: 10px;
      padding: 2rem 1rem;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 1.5rem;
      position: relative;
    }
    .upload-area:hover, .upload-area.dragover {
      border-color: #4a6fa5;
      background: #f7f9fd;
    }
    .upload-area .icon {
      font-size: 2.5rem;
      margin-bottom: 0.4rem;
      opacity: 0.5;
    }
    .upload-area p { color: #888; font-size: 0.85rem; }
    .upload-area .file-name { color: #4a6fa5; font-weight: 600; margin-top: 0.4rem; }
    .upload-area .thumb {
      width: 80px; height: 80px;
      object-fit: cover;
      border-radius: 50%;
      margin-bottom: 0.5rem;
      border: 2px solid #4a6fa5;
    }
    input[type="file"] { display: none; }

    /* Frame options */
    .frame-section { margin-top: 0.25rem; }
    .frame-options {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
    }
    .frame-option {
      width: 140px;
      height: 140px;
      border: 3px solid #e8e8e8;
      border-radius: 10px;
      cursor: pointer;
      overflow: hidden;
      transition: all 0.2s;
      background: #fafafa;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 6px;
    }
    .frame-option:hover { border-color: #a0b4d0; transform: translateY(-2px); }
    .frame-option.selected {
      border-color: #4a6fa5;
      box-shadow: 0 0 0 3px rgba(74,111,165,0.2);
      background: #f5f8ff;
    }
    .frame-option img {
      width: 110px;
      height: 110px;
      object-fit: contain;
      border-radius: 6px;
    }
    .frame-option .label {
      font-size: 0.7rem;
      color: #666;
      margin-top: 4px;
      font-weight: 500;
    }

    /* Preview */
    .canvas-wrapper {
      width: 320px;
      height: 320px;
      background: repeating-conic-gradient(#eee 0% 25%, #fff 0% 50%) 0 0 / 16px 16px;
      border-radius: 50%;
      overflow: hidden;
      margin-bottom: 0.75rem;
      position: relative;
    }
    #mainCanvas {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      cursor: grab;
    }
    #mainCanvas:active {
      cursor: grabbing;
    }
    .placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #bbb;
      font-size: 0.9rem;
      pointer-events: none;
    }
    .size-info {
      font-size: 0.78rem;
      color: #999;
      margin-bottom: 0.75rem;
    }
    .download-btn {
      background: #4a6fa5;
      color: #fff;
      border: none;
      padding: 0.8rem 2.5rem;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      width: 100%;
      max-width: 320px;
      letter-spacing: 0.02em;
    }
    .download-btn:hover:not(:disabled) {
      background: #3a5a8a;
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(74,111,165,0.3);
    }
    .download-btn:disabled { background: #d0d5dd; cursor: not-allowed; }
  </style>
</head>
<body>
  <h1>Profile Frame Creator</h1>
  <p class="subtitle">Upload your photo, pick a frame overlay, and download the result.</p>

  <div class="app-container">
    <div class="panel left-panel">
      <p class="section-title"><span class="step-label">1</span> Upload Your Photo</p>
      <div class="upload-area" id="uploadArea">
        <div class="icon">📷</div>
        <p>Click or drag & drop your image here</p>
        <p class="file-name" id="fileName"></p>
      </div>
      <input type="file" id="fileInput" accept="image/*">

      <div class="frame-section">
        <p class="section-title"><span class="step-label">2</span> Choose a Frame</p>
        <div class="frame-options" id="frameOptions"></div>
      </div>
    </div>

    <div class="panel right-panel">
      <p class="section-title"><span class="step-label">3</span> Preview & Download</p>
      <div class="canvas-wrapper">
        <canvas id="mainCanvas" width="1000" height="1000"></canvas>
        <div class="placeholder" id="placeholder">Upload a photo to begin</div>
      </div>
      <p class="size-info">Drag to reposition · Scroll to zoom</p>
      <p class="size-info" id="sizeInfo">Output: 1000 × 1000 px</p>
      <button class="download-btn" id="downloadBtn" disabled>Download Image</button>
    </div>
  </div>

  <script>
    const mainCanvas = document.getElementById('mainCanvas');
    const mainCtx = mainCanvas.getContext('2d');
    const fileInput = document.getElementById('fileInput');
    const uploadArea = document.getElementById('uploadArea');
    const fileNameEl = document.getElementById('fileName');
    const placeholder = document.getElementById('placeholder');
    const downloadBtn = document.getElementById('downloadBtn');
    const frameOptionsEl = document.getElementById('frameOptions');

    const SIZE = 1000;
    mainCanvas.width = SIZE;
    mainCanvas.height = SIZE;

    let userImage = null;
    let selectedFrameIndex = -1;
    const frameImages = [];

    // Image positioning & zoom
    let imgX = 0, imgY = 0, imgScale = 1;
    let isDragging = false, dragStartX = 0, dragStartY = 0, dragImgX = 0, dragImgY = 0;

    const frameDefs = [
      { src: 'frames/frame1.png', label: 'Frame 1' },
      { src: 'frames/frame2.png', label: 'Frame 2' },
    ];

    function initFrames() {
      frameDefs.forEach((def, i) => {
        const img = new Image();
        img.onload = () => {
          frameImages[i] = img;

          const opt = document.createElement('div');
          opt.className = 'frame-option';
          opt.dataset.index = i;

          const thumb = document.createElement('img');
          thumb.src = def.src;
          thumb.alt = def.label;

          const label = document.createElement('div');
          label.className = 'label';
          label.textContent = def.label;

          opt.appendChild(thumb);
          opt.appendChild(label);
          opt.addEventListener('click', () => selectFrame(i));
          frameOptionsEl.appendChild(opt);
        };
        img.src = def.src;
      });
    }

    function selectFrame(index) {
      selectedFrameIndex = index;
      document.querySelectorAll('.frame-option').forEach((o, i) => {
        o.classList.toggle('selected', i === index);
      });
      render();
    }

    // Upload handling
    uploadArea.addEventListener('click', () => fileInput.click());
    uploadArea.addEventListener('dragover', e => { e.preventDefault(); uploadArea.classList.add('dragover'); });
    uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('dragover'));
    uploadArea.addEventListener('drop', e => {
      e.preventDefault();
      uploadArea.classList.remove('dragover');
      if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
    });
    fileInput.addEventListener('change', () => {
      if (fileInput.files.length) handleFile(fileInput.files[0]);
    });

    function handleFile(file) {
      if (!file.type.startsWith('image/')) return;
      fileNameEl.textContent = file.name;

      // Show thumbnail in upload area
      const reader = new FileReader();
      reader.onload = e => {
        const img = new Image();
        img.onload = () => {
          userImage = img;
          imgX = 0; imgY = 0; imgScale = 1;

          // Update upload area to show thumb
          const existing = uploadArea.querySelector('.thumb');
          if (existing) existing.remove();
          const thumbImg = document.createElement('img');
          thumbImg.className = 'thumb';
          thumbImg.src = e.target.result;
          uploadArea.insertBefore(thumbImg, uploadArea.firstChild);
          uploadArea.querySelector('.icon').style.display = 'none';

          placeholder.style.display = 'none';
          render();
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
    }

    function render() {
      mainCtx.clearRect(0, 0, SIZE, SIZE);

      // Clip everything to a circle
      mainCtx.save();
      mainCtx.beginPath();
      mainCtx.arc(SIZE / 2, SIZE / 2, SIZE / 2, 0, Math.PI * 2);
      mainCtx.closePath();
      mainCtx.clip();

      if (userImage) {
        const iw = userImage.width;
        const ih = userImage.height;
        // Fit entire image inside the canvas
        const scale = Math.min(SIZE / iw, SIZE / ih) * imgScale;
        const dw = iw * scale;
        const dh = ih * scale;
        const dx = (SIZE - dw) / 2 + imgX;
        const dy = (SIZE - dh) / 2 + imgY;
        mainCtx.drawImage(userImage, 0, 0, iw, ih, dx, dy, dw, dh);
      }

      if (selectedFrameIndex >= 0 && frameImages[selectedFrameIndex]) {
        mainCtx.drawImage(frameImages[selectedFrameIndex], 0, 0, SIZE, SIZE);
      }

      mainCtx.restore();
      downloadBtn.disabled = !userImage;
    }

    downloadBtn.addEventListener('click', () => {
      if (!userImage) return;
      const link = document.createElement('a');
      link.download = 'profile-with-frame.png';
      link.href = mainCanvas.toDataURL('image/png');
      link.click();
    });

    // ── Drag to reposition ──
    function canvasToImg(e) {
      const rect = mainCanvas.getBoundingClientRect();
      const scaleX = SIZE / rect.width;
      return {
        x: (e.clientX - rect.left) * scaleX,
        y: (e.clientY - rect.top) * scaleX
      };
    }

    mainCanvas.addEventListener('mousedown', e => {
      if (!userImage) return;
      isDragging = true;
      const p = canvasToImg(e);
      dragStartX = p.x; dragStartY = p.y;
      dragImgX = imgX; dragImgY = imgY;
    });

    window.addEventListener('mousemove', e => {
      if (!isDragging) return;
      const p = canvasToImg(e);
      imgX = dragImgX + (p.x - dragStartX);
      imgY = dragImgY + (p.y - dragStartY);
      render();
    });

    window.addEventListener('mouseup', () => { isDragging = false; });

    // Touch support
    mainCanvas.addEventListener('touchstart', e => {
      if (!userImage || e.touches.length !== 1) return;
      e.preventDefault();
      isDragging = true;
      const t = e.touches[0];
      const p = canvasToImg(t);
      dragStartX = p.x; dragStartY = p.y;
      dragImgX = imgX; dragImgY = imgY;
    }, { passive: false });

    mainCanvas.addEventListener('touchmove', e => {
      if (!isDragging || e.touches.length !== 1) return;
      e.preventDefault();
      const t = e.touches[0];
      const p = canvasToImg(t);
      imgX = dragImgX + (p.x - dragStartX);
      imgY = dragImgY + (p.y - dragStartY);
      render();
    }, { passive: false });

    mainCanvas.addEventListener('touchend', () => { isDragging = false; });

    // ── Scroll to zoom ──
    mainCanvas.addEventListener('wheel', e => {
      if (!userImage) return;
      e.preventDefault();
      const delta = e.deltaY > 0 ? -0.05 : 0.05;
      imgScale = Math.max(0.3, Math.min(3, imgScale + delta));
      render();
    }, { passive: false });

    // Init
    initFrames();
  </script>
</body>
</html>
